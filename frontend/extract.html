<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提取水印 - 盲水印工具</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
<header class="site-header">
  <div style="max-width:800px;margin:0 auto;padding:0 20px;">
    <h1>🔐 盲水印工具</h1>
    <p>基于 DWT-DCT-SVD · 嵌入不可见水印 · 无需原图提取 · 支持批量</p>
    <nav class="nav-bar">
      <a href="index.html" class="nav-link">📝 嵌入水印</a>
      <a href="batch.html" class="nav-link">📦 批量嵌入</a>
      <a href="extract.html" class="nav-link active">🔍 提取水印</a>
    </nav>
  </div>
</header>

<div class="container">
  <div class="card fade-in" id="app">
    <h2 class="section-title">提取文字水印</h2>

    <div style="margin-bottom:20px;">
      <label>带水印的图片</label>
      <div class="drop-zone" :class="{'has-file': file}"
           @click="$refs.input.click()"
           @dragover.prevent="$event.currentTarget.classList.add('dragover')"
           @dragleave="$event.currentTarget.classList.remove('dragover')"
           @drop.prevent="handleDrop($event)">
        <input type="file" ref="input" accept="image/*" @change="handleFile($event)" style="display:none">
        <template v-if="!file">
          <div class="icon">📷</div>
          <p style="font-weight:500;margin-bottom:4px;">点击或拖拽上传带水印的图片</p>
        </template>
        <template v-else>
          <img :src="preview" class="preview-img" alt="预览">
          <p class="file-info">✅ {{ file.name }}</p>
        </template>
      </div>
    </div>

    <!-- 提取方式 -->
    <div style="margin-bottom:20px;">
      <label>提取方式</label>
      <div class="nav-bar" style="margin:0;">
        <button class="nav-link" :class="{active: mode==='text'}" @click="mode='text'" style="font-size:13px;cursor:pointer;">💡 输入水印文字（推荐）</button>
        <button class="nav-link" :class="{active: mode==='len'}" @click="mode='len'" style="font-size:13px;cursor:pointer;">📏 输入水印长度</button>
      </div>
    </div>

    <div v-if="mode==='text'" style="margin-bottom:20px;">
      <label>水印文字（嵌入时输入的文字）</label>
      <input type="text" class="input-field" v-model="wmText" placeholder="输入嵌入时的水印文字，系统自动计算长度...">
      <p class="hint">💡 相同文字 + 相同密码 = 固定长度，无需记住数字</p>
    </div>

    <div v-if="mode==='len'" style="margin-bottom:20px;">
      <label>水印长度</label>
      <input type="number" class="input-field" v-model.number="wmLen" placeholder="嵌入时返回的水印长度数字" min="1">
    </div>

    <div class="grid-2" style="margin-bottom:24px;">
      <div><label>图片密码</label><input type="number" class="input-field" v-model.number="pwdImg" min="1"></div>
      <div><label>水印密码</label><input type="number" class="input-field" v-model.number="pwdWm" min="1"></div>
    </div>

    <button class="btn btn-primary btn-block"
            :disabled="!file || loading || (mode==='text' ? !wmText : !wmLen)"
            @click="doExtract">
      <span v-if="loading" class="spinner"></span>
      <span v-else>🔍</span> 提取水印
    </button>

    <div v-if="error" class="error-box fade-in" style="margin-top:16px;">❌ {{ error }}</div>

    <div v-if="result" class="result-box fade-in" style="margin-top:16px;">
      <h3 style="font-weight:600;margin-bottom:14px;color:var(--success);">✅ 水印提取成功！</h3>
      <div style="background:var(--bg);border-radius:10px;padding:20px;margin-bottom:14px;">
        <p style="font-size:18px;font-weight:600;word-break:break-all;">{{ result }}</p>
      </div>
      <button class="btn btn-outline btn-block" @click="copyResult">📋 复制水印文字</button>
    </div>
  </div>
</div>

<footer class="site-footer">基于 <a href="https://github.com/guofei9987/blind_watermark" target="_blank">blind_watermark</a> 开源项目</footer>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="js/api.js"></script>
<script>
const { createApp, ref } = Vue;
createApp({
  setup() {
    const file = ref(null), preview = ref('');
    const mode = ref('text'), wmText = ref(''), wmLen = ref(null);
    const pwdImg = ref(1), pwdWm = ref(1);
    const loading = ref(false), error = ref(''), result = ref('');

    function setFile(f) {
      file.value = f; preview.value = URL.createObjectURL(f);
      error.value = ''; result.value = '';
    }
    function handleFile(e) { const f = e.target.files[0]; if (f) setFile(f); }
    function handleDrop(e) {
      e.currentTarget.classList.remove('dragover');
      const f = e.dataTransfer.files[0];
      if (f && f.type.startsWith('image/')) setFile(f);
    }

    async function doExtract() {
      loading.value = true; error.value = ''; result.value = '';

      try {
        let length = wmLen.value;

        // 方式一：通过文字计算长度
        if (mode.value === 'text') {
          const resp = await fetch(`${window.location.origin}/api/wm_length?text=${encodeURIComponent(wmText.value)}&password_wm=${pwdWm.value}`);
          if (!resp.ok) throw new Error('计算水印长度失败');
          const data = await resp.json();
          length = data.wm_length;
        }

        const fd = new FormData();
        fd.append('image', file.value);
        fd.append('wm_length', length);
        fd.append('password_img', pwdImg.value);
        fd.append('password_wm', pwdWm.value);

        const data = await utils.fetchJSON('/api/extract', fd);
        result.value = data.watermark;
      } catch (e) { error.value = e.message; }
      finally { loading.value = false; }
    }

    function copyResult() { utils.copyText(result.value); }

    return { file, preview, mode, wmText, wmLen, pwdImg, pwdWm, loading, error, result, handleFile, handleDrop, doExtract, copyResult };
  }
}).mount('#app');
</script>
</body>
</html>
