name: Build & Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      clean_cache:
        description: '是否清理 Docker 构建缓存？'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      clean_old_images:
        description: '是否清理旧版本镜像（只保留最新）？'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_WEB: ghcr.io/${{ github.repository }}/web
  IMAGE_BOT: ghcr.io/${{ github.repository }}/bot

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clean Docker Build Cache
        if: ${{ github.event.inputs.clean_cache == 'true' }}
        run: |
          echo "🧹 清理 Docker 构建缓存..."
          gh cache delete --all || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (Web)
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_WEB }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & Push Web
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Extract metadata (Bot)
        id: meta-bot
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_BOT }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & Push Bot
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.bot
          push: true
          tags: ${{ steps.meta-bot.outputs.tags }}
          labels: ${{ steps.meta-bot.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Clean old container images
        if: ${{ github.event.inputs.clean_old_images == 'true' || github.event_name == 'push' }}
        run: |
          echo "🧹 清理旧版本镜像..."
          PACKAGES=("web" "bot")
          for pkg in "${PACKAGES[@]}"; do
            echo "检查 $pkg ..."
            versions=$(gh api -X GET "/user/packages/container/${{ github.repository }}%2F${pkg}/versions" --paginate -q '.[].id' 2>/dev/null || true)
            count=0
            for id in $versions; do
              count=$((count + 1))
              if [ $count -gt 1 ]; then
                echo "删除旧版本: $id"
                gh api -X DELETE "/user/packages/container/${{ github.repository }}%2F${pkg}/versions/$id" 2>/dev/null || echo "跳过 $id（权限不足或不存在）"
              fi
            done
            echo "$pkg 当前保留: 最新 1 个版本"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## 🐳 Docker 镜像构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像 | 标签 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Web | \`${{ steps.meta-web.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Bot | \`${{ steps.meta-bot.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY